nextest-version = "0.9.122"

# 正确性 suite：事件驱动完成即通过；墙钟只用于「真挂死」保护与 SLOW 标注。
# 禁止把 1s 墙钟硬杀当成性能/正确性门禁——并行负载下天然抖动，必然 flaky。

[profile.default]
test-threads = "num-cpus"
failure-output = "immediate-final"
success-output = "never"
status-level = "pass"
final-status-level = "all"
fail-fast = false
# 0.5s 起标 SLOW（可见性）；不 terminate。
# 真挂死保护：60s 后杀进程（只挡死循环/死锁，不挡调度抖动）。
slow-timeout = { period = "500ms", terminate-after = 120 }

[profile.ci]
test-threads = "num-cpus"
failure-output = "immediate-final"
success-output = "never"
status-level = "pass"
final-status-level = "all"
fail-fast = false
slow-timeout = { period = "500ms", terminate-after = 120 }

# 可选串行观测 profile：只标 SLOW、不硬杀，用于本地看谁慢。
# 用法：cargo nextest run --profile perf --workspace --status-level slow
[profile.perf]
test-threads = 1
failure-output = "immediate-final"
success-output = "never"
status-level = "slow"
final-status-level = "slow"
fail-fast = false
slow-timeout = { period = "500ms", terminate-after = 120 }

[test-groups]
# 资源隔离（端口/共享 cache 路径），不是墙钟预算。
cluster-ipc = { max-threads = 1 }
runtime-cache-delete = { max-threads = 1 }

# cluster IPC：同二进制内串行，降低 IPC reader 与 host 完成队列争用。
# 失败路径已在 runtime 收口（bind/queryServer error → worker exit → primary 不再永久挂），
# 不再需要独占全部测试槽。
[[profile.default.overrides]]
filter = 'binary(cluster_ipc)'
test-group = 'cluster-ipc'


[[profile.ci.overrides]]
filter = 'binary(cluster_ipc)'
test-group = 'cluster-ipc'


[[profile.default.overrides]]
filter = 'test(/modules__runtime_loading.*cjs_require_cache_delete/)'
test-group = 'runtime-cache-delete'

[[profile.ci.overrides]]
filter = 'test(/modules__runtime_loading.*cjs_require_cache_delete/)'
test-group = 'runtime-cache-delete'
