name: test262

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test262:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test262-${{ hashFiles('**/Cargo.lock') }}

      - name: Build wjsm (release)
        run: cargo build --release --bin wjsm-cli

      - name: Run test262 conformance tests
        run: |
          cargo run --release -p wjsm-test262 -- run \
            --suite test/built-ins \
            --no-parallel \
            --timeout-secs 10 \
            --memory-limit-mib 512 \
            --jobs 1 \
            --plain

      - name: Run test262 language tests (subset)
        run: |
          cargo run --release -p wjsm-test262 -- run \
            --suite test/language/expressions \
            --no-parallel \
            --timeout-secs 10 \
            --memory-limit-mib 512 \
            --jobs 1 \
            --plain
