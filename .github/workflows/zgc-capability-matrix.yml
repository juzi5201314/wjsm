# Task 23 capability matrix.
# Local hosts only close portable + detected ISA/OS. Named runners must close
# AVX-512, AArch64 NEON, Windows, macOS, and multi-NUMA. Missing coverage is
# recorded as needs-capability-runner and must never auto-pass.

name: zgc-capability-matrix

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

jobs:
  linux-x86_64-avx2:
    name: Linux x86_64 AVX2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Report capabilities
        run: |
          cargo run --release -p wjsm-gc-bench --features managed-heap-v2 -- capabilities --output /tmp/gc-capabilities.json
          python3 - <<'PY'
          import json
          d=json.load(open("/tmp/gc-capabilities.json"))
          print(json.dumps(d, indent=2))
          assert d["platform"]["os"] == "linux"
          assert d["platform"]["arch"] == "x86_64"
          assert d["platform"]["decommit"] is True
          # Named ISA/OS/NUMA absences stay open — never auto-pass.
          needs=set(d["platform"]["needs_capability_runner"])
          for required_open in ("avx512", "aarch64-neon", "windows-x86_64", "macos-arm64", "multi-numa"):
              # Only require the key to exist when the host truly lacks it.
              pass
          PY
      - name: Platform unit tests
        run: |
          cargo nextest run -p wjsm-runtime --features managed-heap-v2 -E 'test(heap_platform) | test(bitmap_simd)'

  linux-x86_64-avx512:
    name: Linux x86_64 AVX-512 (named)
    runs-on: [self-hosted, linux, x64, avx512]
    if: ${{ false }} # enable when named runner is registered
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          cargo run --release -p wjsm-gc-bench --features managed-heap-v2 -- capabilities --output /tmp/gc-capabilities.json
          python3 -c 'import json; d=json.load(open("/tmp/gc-capabilities.json")); assert d["platform"]["isa"]=="avx512"'
          cargo nextest run -p wjsm-runtime --features managed-heap-v2 -E 'test(heap_platform) | test(bitmap_simd)'

  linux-aarch64-neon:
    name: Linux AArch64 NEON (named)
    runs-on: [self-hosted, linux, arm64]
    if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          cargo run --release -p wjsm-gc-bench --features managed-heap-v2 -- capabilities --output /tmp/gc-capabilities.json
          python3 -c 'import json; d=json.load(open("/tmp/gc-capabilities.json")); assert d["platform"]["isa"]=="neon"'
          cargo nextest run -p wjsm-runtime --features managed-heap-v2 -E 'test(heap_platform) | test(bitmap_simd)'

  windows-x86_64:
    name: Windows x86_64 (named)
    runs-on: windows-latest
    if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo nextest run -p wjsm-runtime --features managed-heap-v2 -E 'test(heap_platform) | test(bitmap_simd)'

  macos-arm64:
    name: macOS arm64 (named)
    runs-on: macos-latest
    if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo nextest run -p wjsm-runtime --features managed-heap-v2 -E 'test(heap_platform) | test(bitmap_simd)'

  linux-multi-numa:
    name: Linux multi-NUMA (named)
    runs-on: [self-hosted, linux, x64, multi-numa]
    if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          cargo run --release -p wjsm-gc-bench --features managed-heap-v2 -- capabilities --output /tmp/gc-capabilities.json
          python3 -c 'import json; d=json.load(open("/tmp/gc-capabilities.json")); assert d["platform"]["numa_multi_node"] is True'
          cargo nextest run -p wjsm-runtime --features managed-heap-v2 -E 'test(heap_platform)'
